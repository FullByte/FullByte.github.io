user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/markdown
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Content negotiation for AI agents: serve source markdown when requested.
    map "$http_accept:$uri" $markdown_candidate {
        default /__markdown_not_found__;
        "~*text/markdown:/$" /index.md;
        "~*text/markdown:(.+)\.html$" $1.md;
        "~*text/markdown:(.+)$" $1.md;
    }

    # Default HTTP server — serves the site on port 80
    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # Let's Encrypt challenge location (used when ENABLE_SSL=true)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Static alias for API catalog discovery (RFC 9727)
        location = /.well-known/api-catalog {
            default_type application/linkset+json;
            add_header Content-Type 'application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"' always;
            try_files /well-known/api-catalog.json =404;
        }

        # Static aliases for OAuth/OIDC discovery metadata
        location = /.well-known/openid-configuration {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files /well-known/openid-configuration.json =404;
        }

        location = /.well-known/oauth-authorization-server {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files /well-known/oauth-authorization-server.json =404;
        }

        location = /.well-known/oauth-protected-resource {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files /well-known/oauth-protected-resource.json =404;
        }

        location = /.well-known/mcp/server-card.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Cache-Control "public, max-age=3600" always;
            try_files /well-known/mcp/server-card.json =404;
        }

        # Static aliases for Agent Skills discovery index and skill documents.
        location = /.well-known/agent-skills/index.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files /well-known/agent-skills/index.json =404;
        }

        location = /.well-known/agent-skills/api-catalog-discovery/SKILL.md {
            default_type text/markdown;
            add_header Content-Type "text/markdown; charset=utf-8" always;
            try_files /well-known/agent-skills/api-catalog-discovery/SKILL.md =404;
        }

        location = /.well-known/agent-skills/oauth-auth-discovery/SKILL.md {
            default_type text/markdown;
            add_header Content-Type "text/markdown; charset=utf-8" always;
            try_files /well-known/agent-skills/oauth-auth-discovery/SKILL.md =404;
        }

        location = /.well-known/agent-skills/mcp-server-discovery/SKILL.md {
            default_type text/markdown;
            add_header Content-Type "text/markdown; charset=utf-8" always;
            try_files /well-known/agent-skills/mcp-server-discovery/SKILL.md =404;
        }

        location = /well-known/api-catalog.json {
            default_type application/linkset+json;
            add_header Content-Type 'application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"' always;
            try_files $uri =404;
        }

        location = /well-known/openid-configuration.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files $uri =404;
        }

        location = /well-known/oauth-authorization-server.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files $uri =404;
        }

        location = /well-known/oauth-protected-resource.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files $uri =404;
        }

        location = /well-known/mcp/server-card.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Cache-Control "public, max-age=3600" always;
            try_files $uri =404;
        }

        location = /well-known/agent-skills/index.json {
            default_type application/json;
            add_header Content-Type "application/json; charset=utf-8" always;
            try_files $uri =404;
        }

        location = /well-known/jwks.json {
            default_type application/jwk-set+json;
            add_header Content-Type "application/jwk-set+json; charset=utf-8" always;
            try_files $uri =404;
        }

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Vary "Accept" always;
        add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json", </about/website/index.html>; rel="service-doc"; type="text/html", </index.md>; rel="alternate"; type="text/markdown"' always;

        location ~* \.md$ {
            default_type text/markdown;
            add_header Content-Type "text/markdown; charset=utf-8" always;
            try_files $uri =404;
        }

        location / {
            try_files $markdown_candidate $uri $uri/ =404;
        }

        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }

        location = /robots.txt {
            log_not_found off;
            access_log off;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTPS server — only active when SSL certificates are present.
    # To enable: run with ENABLE_SSL=true and DOMAIN=yourdomain.com
    # or mount your own certs into /etc/letsencrypt/live/<domain>/
    include /etc/nginx/conf.d/*.conf;
}
